name: CI — Validate & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-bicep:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: az bicep install

      - name: Bicep Build (compile check)
        run: az bicep build --file infra/main.bicep

      - name: Bicep Lint
        run: az bicep lint --file infra/main.bicep
        continue-on-error: true  # Lint warnings should not block CI

  test-python:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r functions/amortized-budget-engine/requirements.txt
          pip install pytest

      - name: Run unit tests
        run: python -m pytest tests/function/ -v --tb=short

  generate-arm:
    name: Generate ARM Template
    runs-on: ubuntu-latest
    needs: validate-bicep
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: az bicep install

      - name: Compile Bicep to ARM
        run: az bicep build --file infra/main.bicep --outfile azuredeploy.json

      - name: Upload ARM template artifact
        uses: actions/upload-artifact@v4
        with:
          name: arm-template
          path: azuredeploy.json
          retention-days: 30
