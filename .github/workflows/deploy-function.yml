name: Deploy Function App Code

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Resource group name (e.g. rg-finops-e2e2)'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-function-code:
    name: Build & Deploy Function App (Blob Upload + MI Auth)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux dependencies
        run: |
          cd functions/amortized-budget-engine
          pip install --target .python_packages/lib/site-packages \
            --implementation cp --platform manylinux2014_x86_64 \
            --python-version 3.11 --only-binary=:all: \
            -r requirements.txt --quiet
          echo "Installed $(find .python_packages -name '*.so' | wc -l) Linux .so files"
          echo "Windows .pyd files: $(find .python_packages -name '*.pyd' | wc -l) (should be 0)"

      - name: Create deployment zip
        run: |
          cd functions/amortized-budget-engine
          zip -r ../../engine.zip function_app.py host.json requirements.txt .python_packages/
          ls -la ../../engine.zip

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy via blob upload (MI-authenticated)
        run: |
          RG="${{ github.event.inputs.resource_group }}"

          # Auto-detect storage account and function app
          SA=$(az storage account list -g "$RG" --query "[0].name" -o tsv)
          FUNC=$(az functionapp list -g "$RG" --query "[0].name" -o tsv)
          echo "Storage: $SA | Function: $FUNC | RG: $RG"

          if [ -z "$SA" ] || [ -z "$FUNC" ]; then
            echo "ERROR: Could not find storage account or function app in $RG"
            exit 1
          fi

          # Create container and upload zip
          az storage container create --name function-releases \
            --account-name "$SA" --auth-mode login --output none 2>/dev/null || true

          az storage blob upload --container-name function-releases --name engine.zip \
            --file engine.zip --account-name "$SA" --auth-mode login --overwrite \
            --output none

          # Set WEBSITE_RUN_FROM_PACKAGE to blob URL (MI reads it, no keys/SAS)
          BLOB_URL="https://${SA}.blob.core.windows.net/function-releases/engine.zip"
          az functionapp config appsettings set -g "$RG" -n "$FUNC" \
            --settings "WEBSITE_RUN_FROM_PACKAGE=$BLOB_URL" --output none

          # Restart to pick up the new package
          az functionapp restart -g "$RG" -n "$FUNC" --output none
          echo "Deployed: $BLOB_URL"

          # Verify via admin API (CLI has caching delay)
          sleep 30
          FUNC_KEY=$(az functionapp keys list -g "$RG" -n "$FUNC" --query "masterKey" -o tsv 2>/dev/null || echo "")
          FUNC_HOST=$(az functionapp show -g "$RG" -n "$FUNC" --query "defaultHostName" -o tsv)
          if [ -n "$FUNC_KEY" ]; then
            FUNC_COUNT=$(curl -s "https://$FUNC_HOST/admin/functions?code=$FUNC_KEY" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
            echo "Functions loaded: $FUNC_COUNT/9"
          fi

      - name: Trigger initial data pipeline
        run: |
          RG="${{ github.event.inputs.resource_group }}"
          FUNC=$(az functionapp list -g "$RG" --query "[0].name" -o tsv)
          FUNC_KEY=$(az functionapp keys list -g "$RG" -n "$FUNC" --query "functionKeys.default" -o tsv 2>/dev/null || echo "")
          FUNC_HOST=$(az functionapp show -g "$RG" -n "$FUNC" --query "defaultHostName" -o tsv)
          if [ -n "$FUNC_KEY" ]; then
            echo "Triggering backfill..."
            curl -s "https://$FUNC_HOST/api/backfill?code=$FUNC_KEY" --max-time 120 || echo "Backfill triggered"
            echo "Triggering evaluate..."
            curl -s "https://$FUNC_HOST/api/evaluate?code=$FUNC_KEY" --max-time 120 || echo "Evaluate triggered"
          fi
